<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Secure Password Generator</title>
        <style>
            /* CSS - Светло-зеленая тема доверия */
            body {
                background-color: #e8f5e9;
                color: #2e7d32;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .container {
                background-color: #ffffff;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(46, 125, 50, 0.15);
                width: 450px;
                text-align: center;
                border: 1px solid #c8e6c9;
            }

            h1 {
                margin-top: 0;
                font-size: 24px;
                color: #1b5e20;
                font-weight: 600;
            }

            .subtitle {
                font-size: 14px;
                color: #2e7d32;
                margin-bottom: 25px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 28px;
                font-weight: 500;
            }

            .subtitle .length-info {
                display: inline;
            }

            .subtitle .options-inline {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .subtitle input[type="checkbox"] {
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: #43a047;
            }

            .subtitle label {
                cursor: pointer;
                user-select: none;
                font-size: 14px;
                font-weight: 500;
            }

            .password-list {
                list-style: none;
                padding: 0;
                margin: 20px 0;
                text-align: left;
            }

            .password-item {
                background-color: #f1f8e9;
                padding: 8px;
                margin-bottom: 10px;
                border-radius: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 17px;
                border: 1px solid #dcedc8;
                font-family: "Consolas", "Monaco", monospace;
                transition:
                    transform 0.1s ease,
                    border-color 0.2s;
            }

            .password-item:hover {
                border-color: #66bb6a;
                transform: translateY(-1px);
            }

            .pass-text {
                letter-spacing: 0.5px;
                flex-grow: 1;
                color: #33691e;
            }

            .copy-btn {
                background: none;
                border: none;
                color: #43a047;
                cursor: pointer;
                font-size: 20px;
                margin-left: 15px;
                padding: 5px;
                transition: all 0.2s;
                border-radius: 4px;
                display: flex; /* Для центрирования SVG */
                align-items: center;
            }

            .copy-btn:hover {
                color: #1b5e20;
                background-color: #c8e6c9;
            }

            .copy-btn:active {
                transform: scale(0.9);
            }

            .copy-btn.success {
                color: #2e7d32;
            }

            /* Стилизация SVG внутри кнопок */
            .copy-btn svg,
            .refresh-btn svg {
                width: 1.1em;
                height: 1.1em;
                fill: currentColor;
                vertical-align: text-bottom;
            }

            .refresh-btn {
                background-color: #43a047;
                color: white;
                border: none;
                padding: 16px 24px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
                width: 100%;
                font-size: 15px;
                transition: background-color 0.2s;
                margin-top: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px; /* Расстояние между иконкой и текстом */
            }

            .refresh-btn:hover {
                background-color: #2e7d32;
            }

            .password-item.blurred .pass-text {
                filter: blur(8px);
                user-select: none;
            }

            .password-item.disabled {
                opacity: 0.4;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Генератор паролей</h1>
            <span class="subtitle">
                <span class="length-info">Длина: 16</span>
                <span class="options-inline">
                    <input type="checkbox" id="noSpecialChars" />
                    <label for="noSpecialChars">Спецсимволы</label>
                </span>
            </span>

            <ul class="password-list" id="passwordList">
                <!-- Пароли будут здесь -->
            </ul>

            <button class="refresh-btn" onclick="generateAllPasswords()">
                <!-- SVG Иконка обновления (встроенная) -->
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    viewBox="0 0 16 16"
                >
                    <path
                        d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"
                    />
                    <path
                        d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"
                    />
                </svg>
                Сгенерировать новые
            </button>
        </div>

        <script>
            // JavaScript - Логика

            // Определяем SVG строки как переменные для удобства
            const iconCopy = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/></svg>`;

            // Иконка галочки (добавлена для обратной связи)
            const iconCheck = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/></svg>`;

            // Криптографически безопасная генерация пароля
            function generatePassword(length, withSpecialChars = false) {
                const lowercase = "abcdefghijklmnopqrstuvwxyz";
                const uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const digits = "0123456789";
                const special = "!@#$%^&*";

                let allChars, requiredChars;

                if (withSpecialChars) {
                    // Буквы + цифры + спецсимволы
                    allChars = lowercase + uppercase + digits + special;
                    // Гарантируем хотя бы один символ каждого типа
                    requiredChars = [
                        lowercase[getSecureRandomIndex(lowercase)],
                        uppercase[getSecureRandomIndex(uppercase)],
                        digits[getSecureRandomIndex(digits)],
                        special[getSecureRandomIndex(special)],
                    ];
                } else {
                    // Только буквы и цифры
                    allChars = lowercase + uppercase + digits;
                    // Гарантируем хотя бы одну букву каждого регистра и одну цифру
                    requiredChars = [
                        lowercase[getSecureRandomIndex(lowercase)],
                        uppercase[getSecureRandomIndex(uppercase)],
                        digits[getSecureRandomIndex(digits)],
                    ];
                }

                // Начинаем с обязательных символов
                const password = [...requiredChars];

                // Заполняем оставшующую длину случайными символами
                for (let i = password.length; i < length; i++) {
                    password.push(allChars[getSecureRandomIndex(allChars)]);
                }

                // Перемешиваем пароль с помощью криптографически безопасного метода
                return shuffleArray(password, length).join("");
            }

            // Криптографически безопасный генератор случайных индексов
            function getSecureRandomIndex(chars) {
                const array = new Uint32Array(1);
                crypto.getRandomValues(array);
                return array[0] % chars.length;
            }

            // Перемешивание массива с использованием криптографически безопасных случайных чисел
            function shuffleArray(array, length) {
                const result = [...array];
                for (let i = length - 1; i > 0; i--) {
                    const randomArray = new Uint32Array(1);
                    crypto.getRandomValues(randomArray);
                    const j = randomArray[0] % (i + 1);
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            // Копирование в буфер обмена с fallback для старых браузеров
            function copyToClipboard(text, button) {
                // Основной метод через Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard
                        .writeText(text)
                        .then(() => {
                            showCopySuccess(button);
                        })
                        .catch((err) => {
                            console.error("Ошибка Clipboard API:", err);
                            fallbackCopy(text, button);
                        });
                } else {
                    // Fallback для браузеров без поддержки Clipboard API
                    fallbackCopy(text, button);
                }
            }

            // Fallback метод копирования через textarea
            function fallbackCopy(text, button) {
                const textarea = document.createElement("textarea");
                textarea.value = text;
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                textarea.style.left = "-9999px";
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    const successful = document.execCommand("copy");
                    if (successful) {
                        showCopySuccess(button);
                    } else {
                        console.error("Копирование не удалось");
                    }
                } catch (err) {
                    console.error("Ошибка копирования:", err);
                }
                
                document.body.removeChild(textarea);
            }

            // Показываем успешное копирование
            function showCopySuccess(button) {
                button.innerHTML = iconCheck;
                button.classList.add("success");

                // Возвращаем иконку копирования через 1.5 секунды
                setTimeout(() => {
                    button.innerHTML = iconCopy;
                    button.classList.remove("success");
                }, 1500);
            }

            // Размывает все пароли кроме указанного и блокирует их
            function blurOtherPasswords(exceptElement) {
                const allItems = document.querySelectorAll(".password-item");
                allItems.forEach((item) => {
                    if (item !== exceptElement) {
                        item.classList.add("blurred");
                        item.classList.add("disabled");
                    } else {
                        item.classList.remove("blurred");
                        item.classList.remove("disabled");
                    }
                });
            }

            // Снимает размытие и блокировку со всех паролей
            function clearBlur() {
                const allItems = document.querySelectorAll(".password-item");
                allItems.forEach((item) => {
                    item.classList.remove("blurred");
                    item.classList.remove("disabled");
                });
            }

            function createPasswordElement(password) {
                const list = document.getElementById("passwordList");
                const li = document.createElement("li");
                li.className = "password-item";

                const span = document.createElement("span");
                span.className = "pass-text";
                span.textContent = password;

                const btn = document.createElement("button");
                btn.className = "copy-btn";
                btn.title = "Скопировать";

                // Вставляем SVG иконку копирования
                btn.innerHTML = iconCopy;

                btn.onclick = function () {
                    blurOtherPasswords(li);
                    copyToClipboard(password, this);
                };

                // Клик по паролю тоже копирует и размывает остальные
                li.onclick = function (e) {
                    if (e.target !== btn) {
                        blurOtherPasswords(li);
                        copyToClipboard(password, btn);
                    }
                };

                li.appendChild(span);
                li.appendChild(btn);
                list.appendChild(li);
            }

            function generateAllPasswords() {
                const list = document.getElementById("passwordList");
                list.innerHTML = "";
                
                const withSpecialChars = document.getElementById("noSpecialChars").checked;

                for (let i = 0; i < 8; i++) {
                    createPasswordElement(generatePassword(16, withSpecialChars));
                }
                
                // Сбрасываем размытие при новой генерации
                clearBlur();
            }

            window.onload = generateAllPasswords;
            
            // Перегенерация при изменении чекбокса
            document.getElementById("noSpecialChars").addEventListener("change", generateAllPasswords);
        </script>
    </body>
</html>
